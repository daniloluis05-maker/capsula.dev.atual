<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C6FF7"/>
      <stop offset="100%" stop-color="#2EC4A0"/>
    </linearGradient>
  </defs>

  <!-- Fundo rounded square escuro -->
  <rect width="100" height="100" rx="22" fill="#0A0A0F"/>

  <!-- Anel/arco do G — mesmo estilo do C original, com gap no lado direito -->
  <path d="M 50 22
           A 28 28 0 1 0 78 50
           L 78 50"
        fill="none"
        stroke="url(#g)"
        stroke-width="9"
        stroke-linecap="round"/>

  <!-- Barra interna horizontal do G (diferença em relação ao C) -->
  <rect x="58" y="46.5" width="20" height="7" rx="1" fill="#fff"/>
</svg>
