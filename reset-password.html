<!DOCTYPE html>
<html lang="pt-BR">
<head>
<!-- @include theme-init -->
<script>
  (function () {
    try {
      var saved = localStorage.getItem('gnosis_theme');
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
      else if (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    } catch (_) {}
  })();
</script>
<!-- @endinclude theme-init -->
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0A0A0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co;">
<meta name="robots" content="noindex, nofollow">
<title>Nova senha | Sistema Gnosis</title>
<link rel="stylesheet" href="css/reset-password.css">
</head>
<body>

<div class="card loading-card" id="loading-card">
  <div class="spinner"></div>
  <h2>Verificando link…</h2>
  <p>Aguarde um momento.</p>
</div>

<div class="card" id="form-card" style="display:none">
  <h2>Nova senha</h2>
  <p class="subtitle">Digite sua nova senha abaixo.</p>
  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>
  <label for="nova-senha">Nova senha</label>
  <input type="password" id="nova-senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
  <label for="confirmar-senha">Confirmar senha</label>
  <input type="password" id="confirmar-senha" placeholder="Repita a senha" autocomplete="new-password">
  <button class="btn" id="salvar-btn">Salvar nova senha</button>
</div>

<div class="card" id="error-card" style="display:none; text-align:center">
  <div style="font-size:2.5rem;margin-bottom:1rem">✗</div>
  <h2>Link inválido</h2>
  <p style="margin-top:0.5rem">Este link expirou ou já foi usado.<br><br><a href="index.html">← Voltar para a página inicial</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.1/dist/umd/supabase.js" integrity="sha384-IiV7lMrgUYFjr7nKnX1XDxweNl9p95vzrLcmfcQ8dMKM5kqqCi6iwxDaRcr+I9Vc" crossorigin="anonymous"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/reset-password-app.js"></script>
</body>
</html>
