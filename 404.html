<!DOCTYPE html>
<html lang="pt-BR">
<head>
<!-- @include theme-init -->
<script>
  (function () {
    try {
      var saved = localStorage.getItem('gnosis_theme');
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
      else if (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    } catch (_) {}
  })();
</script>
<!-- @endinclude theme-init -->
  <meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0A0A0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';">
  <title>Página não encontrada | Sistema Gnosis</title>
  <meta name="robots" content="noindex">
  <link rel="preload" href="https://fonts.gstatic.com/s/outfit/v11/QGYyz_MVcBeNP4NjuGObqx1XmO1I4TC0C4G-EiAou6Y.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap&v=2" rel="stylesheet">
<link rel="stylesheet" href="css/404.css">
</head>
<body>

    <div class="code">404</div>
    <h1>Página não encontrada</h1>
    <p>O endereço que você acessou não existe ou foi movido.<br>Volte para o início e continue sua jornada.</p>
    <a href="/">Voltar ao início</a>

</body>
</html>
