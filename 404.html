<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada | Sistema Gnosis</title>
  <meta name="robots" content="noindex">
  <link rel="preload" href="https://fonts.gstatic.com/s/outfit/v11/QGYyz_MVcBeNP4NjuGObqx1XmO1I4TC0C4G-EiAou6Y.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap&v=2" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: rgba(255,255,255,0.08);
      --text: #e8e8f0;
      --muted: rgba(232,232,240,0.45);
      --accent: #7c6af7;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    .code {
      font-family: 'Space Mono', monospace;
      font-size: clamp(5rem, 20vw, 8rem);
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -4px;
      margin-bottom: 1.5rem;
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.75rem; }
    p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; }
    a {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Página não encontrada</h1>
    <p>O endereço que você acessou não existe ou foi movido.<br>Volte para o início e continue sua jornada.</p>
    <a href="/">Voltar ao início</a>
  </div>
</body>
</html>
