<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Nova senha | Sistema Gnosis</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0A0A0F;
    color: #F0EEF8;
    font-family: 'Outfit', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    width: 100%;
    max-width: 380px;
    padding: 2rem;
    background: #12111A;
    border: 1px solid #2A2840;
    border-radius: 16px;
  }
  h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.4rem; }
  .subtitle { color: #8B899E; font-size: 0.88rem; margin-bottom: 1.5rem; }
  label { display: block; font-size: 0.82rem; color: #8B899E; margin-bottom: 0.35rem; }
  input {
    width: 100%;
    background: #1C1B27;
    border: 1px solid #2A2840;
    border-radius: 8px;
    color: #F0EEF8;
    font-size: 0.95rem;
    padding: 0.65rem 0.9rem;
    outline: none;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #7C6FF7; }
  .btn {
    width: 100%;
    background: #7C6FF7;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.7rem;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover { background: #6B5EE6; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #f87171;
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    font-size: 0.85rem;
    margin-bottom: 1rem;
    display: none;
  }
  .success-msg {
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.3);
    color: #4ade80;
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    font-size: 0.85rem;
    margin-bottom: 1rem;
    display: none;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(124,111,247,0.25);
    border-top-color: #7C6FF7;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin: 0 auto 1.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-card { text-align: center; }
  .loading-card p { color: #8B899E; font-size: 0.88rem; }
  a { color: #7C6FF7; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card loading-card" id="loading-card">
  <div class="spinner"></div>
  <h2>Verificando link…</h2>
  <p>Aguarde um momento.</p>
</div>

<div class="card" id="form-card" style="display:none">
  <h2>Nova senha</h2>
  <p class="subtitle">Digite sua nova senha abaixo.</p>
  <div class="error-msg" id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>
  <label for="nova-senha">Nova senha</label>
  <input type="password" id="nova-senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
  <label for="confirmar-senha">Confirmar senha</label>
  <input type="password" id="confirmar-senha" placeholder="Repita a senha" autocomplete="new-password">
  <button class="btn" id="salvar-btn">Salvar nova senha</button>
</div>

<div class="card" id="error-card" style="display:none; text-align:center">
  <div style="font-size:2.5rem;margin-bottom:1rem">✗</div>
  <h2>Link inválido</h2>
  <p style="margin-top:0.5rem">Este link expirou ou já foi usado.<br><br><a href="index.html">← Voltar para a página inicial</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.1/dist/umd/supabase.js" integrity="sha384-IiV7lMrgUYFjr7nKnX1XDxweNl9p95vzrLcmfcQ8dMKM5kqqCi6iwxDaRcr+I9Vc" crossorigin="anonymous"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script>
(async function () {
  const loadingCard = document.getElementById('loading-card');
  const formCard    = document.getElementById('form-card');
  const errorCard   = document.getElementById('error-card');
  const errorMsg    = document.getElementById('error-msg');
  const successMsg  = document.getElementById('success-msg');
  const salvarBtn   = document.getElementById('salvar-btn');
  const novaSenha   = document.getElementById('nova-senha');
  const confirmarSenha = document.getElementById('confirmar-senha');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    successMsg.style.display = 'none';
  }

  function showSuccess(msg) {
    successMsg.textContent = msg;
    successMsg.style.display = 'block';
    errorMsg.style.display = 'none';
  }

  // Aguarda sessão de recovery
  let session = null;
  let attempts = 0;
  while (!session && attempts < 5) {
    const result = await capsulaDB.authGetSession();
    session = result.session;
    if (!session) await new Promise(r => setTimeout(r, 600));
    attempts++;
  }

  if (!session) {
    loadingCard.style.display = 'none';
    errorCard.style.display = 'block';
    return;
  }

  loadingCard.style.display = 'none';
  formCard.style.display = 'block';

  salvarBtn.addEventListener('click', async () => {
    const senha = novaSenha.value.trim();
    const confirmar = confirmarSenha.value.trim();

    if (!senha || senha.length < 6) {
      showError('A senha deve ter pelo menos 6 caracteres.');
      return;
    }
    if (senha !== confirmar) {
      showError('As senhas não coincidem.');
      return;
    }

    salvarBtn.disabled = true;
    salvarBtn.textContent = 'Salvando…';
    errorMsg.style.display = 'none';

    try {
      const db = capsulaDB.getDB();
      const { error } = await db.auth.updateUser({ password: senha });

      if (error) {
        showError(error.message || 'Erro ao atualizar senha.');
        salvarBtn.disabled = false;
        salvarBtn.textContent = 'Salvar nova senha';
        return;
      }

      showSuccess('Senha atualizada com sucesso! Redirecionando…');
      salvarBtn.disabled = true;
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
    } catch (e) {
      showError(e.message || 'Erro inesperado.');
      salvarBtn.disabled = false;
      salvarBtn.textContent = 'Salvar nova senha';
    }
  });

  // Enter para submeter
  [novaSenha, confirmarSenha].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') salvarBtn.click(); });
  });
})();
</script>
</body>
</html>
