<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil DISC — Sistema Gnosis</title>
<link rel="stylesheet" href="css/capsula.css">
<meta name="robots" content="noindex">
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 2.5rem 1rem 4rem; }
  .share-header { text-align: center; margin-bottom: 2rem; }
  .share-header a { font-size: 0.82rem; color: var(--muted); text-decoration: none; display: inline-block; margin-bottom: 1rem; }
  .share-header a:hover { color: var(--accent); }
  .brand { font-size: 0.95rem; color: var(--muted); margin-bottom: 0.3rem; }
  .brand span { color: var(--accent); font-weight: 600; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  .profile-badge {
    display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;
  }
  .profile-dot {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 800; color: #fff; flex-shrink: 0;
  }
  .profile-name { font-size: 1.3rem; font-weight: 700; }
  .profile-code { font-size: 0.82rem; color: var(--muted); margin-top: 0.15rem; }

  .scores-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem;
  }
  .score-item { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 0.75rem 1rem; }
  .score-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .score-bar-wrap { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.3rem; }
  .score-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
  .score-val { font-size: 0.85rem; font-weight: 700; font-family: monospace; }

  .archetype-text {
    font-size: 0.88rem; color: rgba(232,232,240,0.75); line-height: 1.65;
    border-top: 1px solid var(--border); padding-top: 1.25rem; margin-bottom: 1.25rem;
  }

  .traits-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
  .trait-chip {
    font-size: 0.75rem; padding: 0.25rem 0.65rem; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.12); color: var(--muted);
  }

  .cta-block { text-align: center; border-top: 1px solid var(--border); padding-top: 1.25rem; }
  .cta-block p { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.75rem; }
  .btn-cta {
    display: inline-block; background: var(--accent); color: #fff;
    padding: 0.7rem 1.8rem; border-radius: 8px; font-weight: 600;
    font-size: 0.9rem; text-decoration: none; transition: opacity 0.2s;
  }
  .btn-cta:hover { opacity: 0.88; color: #fff; }

  .error-state { text-align: center; padding: 3rem 1rem; }
  .error-state h2 { margin-bottom: 0.5rem; }
  .error-state p { color: var(--muted); font-size: 0.9rem; }

  .completed-at { font-size: 0.72rem; color: var(--muted); text-align: right; margin-top: 0.5rem; font-family: monospace; }
</style>
</head>
<body>

<div class="share-header">
  <p class="brand">Sistema <span>Gnosis</span></p>
  <p style="font-size:0.85rem;color:var(--muted);">Resultado DISC compartilhado</p>
</div>

<div id="result-card" class="result-card" style="display:none">
  <div class="profile-badge">
    <div class="profile-dot" id="s-dot"></div>
    <div>
      <div class="profile-name" id="s-title"></div>
      <div class="profile-code" id="s-code"></div>
    </div>
  </div>

  <div class="scores-grid" id="s-scores"></div>

  <p class="archetype-text" id="s-archetype"></p>

  <div class="traits-row" id="s-traits"></div>

  <div class="cta-block">
    <p>Descubra seu perfil DISC gratuitamente</p>
    <a href="index.html" class="btn-cta">Começar agora →</a>
  </div>

  <p class="completed-at" id="s-date"></p>
</div>

<div id="error-state" class="error-state" style="display:none">
  <h2>Link inválido</h2>
  <p>Este link de compartilhamento expirou ou está incorreto.</p>
  <br>
  <a href="index.html" class="btn-cta">Ir para o início</a>
</div>

<script>
const PROFILES = {
  D: { title:'O Executor', code:'Dominância', color:'#E8603A', archetype:'Perfil <strong>Dominante</strong> — orientado a resultados e liderança direta', traits:['Decidido','Competitivo','Direto','Corajoso','Independente','Orientado a metas'] },
  I: { title:'O Catalisador', code:'Influência', color:'#6C5FE6', archetype:'Perfil <strong>Influente</strong> — conectado, entusiasmado e persuasivo', traits:['Comunicativo','Entusiasmado','Persuasivo','Criativo','Otimista','Social'] },
  S: { title:'O Guardião', code:'Estabilidade', color:'#2EC4A0', archetype:'Perfil <strong>Estável</strong> — confiável, paciente e orientado ao grupo', traits:['Leal','Paciente','Confiável','Empático','Consistente','Colaborativo'] },
  C: { title:'O Analista', code:'Conformidade', color:'#1BA8D4', archetype:'Perfil <strong>Conformista</strong> — analítico, preciso e orientado à qualidade', traits:['Analítico','Preciso','Lógico','Organizado','Criterioso','Detalhista'] },
};
const LABELS = { D:'Dominância', I:'Influência', S:'Estabilidade', C:'Conformidade' };
const COLORS = { D:'#E8603A', I:'#6C5FE6', S:'#2EC4A0', C:'#1BA8D4' };

(function init() {
  try {
    const params = new URLSearchParams(window.location.search);
    const raw = params.get('d');
    if (!raw) throw new Error('no data');

    const json = atob(raw.replace(/-/g,'+').replace(/_/g,'/'));
    const data = JSON.parse(json);

    const { dominant, scores, completedAt, name } = data;
    if (!dominant || !scores) throw new Error('invalid');

    const profile = PROFILES[dominant];
    if (!profile) throw new Error('invalid profile');

    // Title
    document.getElementById('s-dot').textContent = dominant;
    document.getElementById('s-dot').style.background = profile.color;
    document.getElementById('s-title').textContent = (name ? name + ' — ' : '') + profile.title;
    document.getElementById('s-code').textContent = profile.code + ' · ' + (scores[dominant] || 0) + '%';

    // Scores
    const sg = document.getElementById('s-scores');
    ['D','I','S','C'].forEach(k => {
      const pct = scores[k] || 0;
      sg.innerHTML += `<div class="score-item">
        <div class="score-label">${LABELS[k]}</div>
        <div class="score-bar-wrap">
          <div class="score-bar"><div class="score-fill" style="width:${pct}%;background:${COLORS[k]};"></div></div>
          <span class="score-val" style="color:${COLORS[k]}">${pct}%</span>
        </div>
      </div>`;
    });

    // Archetype
    document.getElementById('s-archetype').innerHTML = profile.archetype;

    // Traits
    const tr = document.getElementById('s-traits');
    profile.traits.forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'trait-chip';
      chip.textContent = t;
      chip.style.borderColor = profile.color + '40';
      chip.style.color = profile.color;
      tr.appendChild(chip);
    });

    // Date
    if (completedAt) {
      const d = new Date(completedAt);
      document.getElementById('s-date').textContent = 'Realizado em ' + d.toLocaleDateString('pt-BR');
    }

    document.getElementById('result-card').style.display = 'block';
  } catch(e) {
    document.getElementById('error-state').style.display = 'block';
  }
})();
</script>
</body>
</html>
