name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Syntax + Lint + Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Syntax check (node --check)
        run: npm run syntax

      - name: ESLint
        run: npm run lint

      - name: Prettier (format check)
        run: npm run format:check
        continue-on-error: true # warn-only por enquanto — código existente não está formatado
