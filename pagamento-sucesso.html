<!DOCTYPE html>
<html lang="pt-BR">
<head>
<!-- @include theme-init -->
<script>
  (function () {
    try {
      var saved = localStorage.getItem('gnosis_theme');
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
      else if (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    } catch (_) {}
  })();
</script>
<!-- @endinclude theme-init -->
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0A0A0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://www.google-analytics.com https://*.analytics.google.com https://*.google-analytics.com;">
<title>Pagamento confirmado — Sistema Gnosis</title>
<link rel="stylesheet" href="css/capsula.css">
<meta name="robots" content="noindex">
<link rel="stylesheet" href="css/pagamento-sucesso.css">
</head>
<body>

    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#4caf87" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>

  <h1>Pagamento confirmado!</h1>
  <p class="subtitle" id="subtitle">Seus créditos estão sendo adicionados à sua conta. Isso leva alguns segundos.</p>

  <a href="dashboard.html" class="btn-dash">Ir para o Dashboard →</a>

</div>

</html>
