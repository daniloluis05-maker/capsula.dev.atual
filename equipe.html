<!-- @include theme-init -->
<script>
  (function () {
    try {
      var saved = localStorage.getItem('gnosis_theme');
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
      else if (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    } catch (_) {}
  })();
</script>
<!-- @endinclude theme-init -->

<link rel="manifest" href="/manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<script>
  (function () {
    // Páginas que fazem paywall check assíncrono — esconde body até decidir
    try {
      var u = JSON.parse(localStorage.getItem('capsula_user') || 'null');
      // Heurística rápida: se user tem plano gerencial OU pro, libera; senão mantém oculto
      // (JS principal vai sobrescrever com 'acesso restrito' se necessário)
      var hasAccess = u && (u.is_admin || (u.plano === 'gerencial') || (u.plano === 'pro'));
      // Sempre esconde inicialmente — JS principal mostra/redireciona depois
      document.documentElement.classList.add('gnosis-paywall-loading');
    } catch (_) {}
  })();
</script>
<script>
  // Remove overlay quando body recebe primeira mutação significativa
  // (JS principal renderizou conteúdo OU substituiu por 'acesso restrito')
  (function () {
    function clearLoader() {
      document.documentElement.classList.remove('gnosis-paywall-loading');
    }
    function start() {
      if (!document.documentElement.classList.contains('gnosis-paywall-loading')) return;
      var done = false;
      var obs = new MutationObserver(function () {
        // Considera pronto quando body tem conteúdo VISÍVEL (não só script tags)
        var body = document.body;
        if (!body) return;
        // Verifica se há algum elemento visível com texto/conteúdo real
        var hasVisible = body.querySelector('h1, h2, .topbar, [id*="page"]:not([style*="display:none"]), .empty-sec, [class*="container"]');
        if (hasVisible && !done) {
          done = true;
          obs.disconnect();
          // Pequeno delay pra garantir renderização
          requestAnimationFrame(function () {
            requestAnimationFrame(clearLoader);
          });
        }
      });
      obs.observe(document.body, { childList: true, subtree: true, attributes: true });
      // Fallback: 4s force-clear
      setTimeout(function () { if (!done) { done = true; obs.disconnect(); clearLoader(); } }, 4000);
    }
    if (document.body) start();
    else document.addEventListener('DOMContentLoaded', start);
  })();
</script>
</head>
