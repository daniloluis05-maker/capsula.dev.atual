<!DOCTYPE html>
<html lang="pt-BR">
<head>
<!-- @include theme-init -->
<script>
  (function () {
    try {
      var saved = localStorage.getItem('gnosis_theme');
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
      else if (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    } catch (_) {}
  })();
</script>
<!-- @endinclude theme-init -->
<meta charset="UTF-8">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0A0A0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co;">
<meta name="robots" content="noindex, nofollow">
<title>Autenticando… | Sistema Gnosis</title>
<link rel="stylesheet" href="css/auth-callback.css">
</head>

</body>
</html>
