<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co;">
<meta name="robots" content="noindex, nofollow">
<title>Autenticando… | Sistema Gnosis</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0A0A0F;
    color: #F0EEF8;
    font-family: 'Outfit', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    text-align: center;
    max-width: 380px;
    padding: 2rem;
  }
  .spinner {
    width: 44px;
    height: 44px;
    border: 3px solid rgba(124, 111, 247, 0.25);
    border-top-color: #7C6FF7;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin: 0 auto 1.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { font-size: 1.15rem; font-weight: 600; margin-bottom: 0.5rem; }
  p  { color: #8B899E; font-size: 0.88rem; line-height: 1.5; }
  .error-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  a { color: #7C6FF7; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <h2 id="title">Autenticando…</h2>
  <p  id="msg">Aguarde um momento.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.1/dist/umd/supabase.js" integrity="sha384-IiV7lMrgUYFjr7nKnX1XDxweNl9p95vzrLcmfcQ8dMKM5kqqCi6iwxDaRcr+I9Vc" crossorigin="anonymous"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/auth-callback-app.js"></script>
</body>
</html>
