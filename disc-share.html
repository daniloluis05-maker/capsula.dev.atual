<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https: data:; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co;">
<title>Perfil DISC — Sistema Gnosis</title>
<link rel="stylesheet" href="css/capsula.css">
<meta name="robots" content="noindex">
<style>
  body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 2.5rem 1rem 4rem; }
  .share-header { text-align: center; margin-bottom: 2rem; }
  .share-header a { font-size: 0.82rem; color: var(--muted); text-decoration: none; display: inline-block; margin-bottom: 1rem; }
  .share-header a:hover { color: var(--accent); }
  .brand { font-size: 0.95rem; color: var(--muted); margin-bottom: 0.3rem; }
  .brand span { color: var(--accent); font-weight: 600; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  .profile-badge {
    display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;
  }
  .profile-dot {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 800; color: #fff; flex-shrink: 0;
  }
  .profile-name { font-size: 1.3rem; font-weight: 700; }
  .profile-code { font-size: 0.82rem; color: var(--muted); margin-top: 0.15rem; }

  .scores-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem;
  }
  .score-item { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 0.75rem 1rem; }
  .score-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .score-bar-wrap { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.3rem; }
  .score-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
  .score-val { font-size: 0.85rem; font-weight: 700; font-family: monospace; }

  .archetype-text {
    font-size: 0.88rem; color: rgba(232,232,240,0.75); line-height: 1.65;
    border-top: 1px solid var(--border); padding-top: 1.25rem; margin-bottom: 1.25rem;
  }

  .traits-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
  .trait-chip {
    font-size: 0.75rem; padding: 0.25rem 0.65rem; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.12); color: var(--muted);
  }

  .cta-block { text-align: center; border-top: 1px solid var(--border); padding-top: 1.25rem; }
  .cta-block p { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.75rem; }
  .btn-cta {
    display: inline-block; background: var(--accent); color: #fff;
    padding: 0.7rem 1.8rem; border-radius: 8px; font-weight: 600;
    font-size: 0.9rem; text-decoration: none; transition: opacity 0.2s;
  }
  .btn-cta:hover { opacity: 0.88; color: #fff; }

  .error-state { text-align: center; padding: 3rem 1rem; }
  .error-state h2 { margin-bottom: 0.5rem; }
  .error-state p { color: var(--muted); font-size: 0.9rem; }

  .completed-at { font-size: 0.72rem; color: var(--muted); text-align: right; margin-top: 0.5rem; font-family: monospace; }
</style>
</head>
<body>

<div class="share-header">
  <p class="brand">Sistema <span>Gnosis</span></p>
  <p style="font-size:0.85rem;color:var(--muted);">Resultado DISC compartilhado</p>
</div>

<div id="result-card" class="result-card" style="display:none">
  <div class="profile-badge">
    <div class="profile-dot" id="s-dot"></div>
    <div>
      <div class="profile-name" id="s-title"></div>
      <div class="profile-code" id="s-code"></div>
    </div>
  </div>

  <div class="scores-grid" id="s-scores"></div>

  <p class="archetype-text" id="s-archetype"></p>

  <div class="traits-row" id="s-traits"></div>

  <div class="cta-block">
    <p>Descubra seu perfil DISC gratuitamente</p>
    <a href="index.html" class="btn-cta">Começar agora →</a>
  </div>

  <p class="completed-at" id="s-date"></p>
</div>

<div id="error-state" class="error-state" style="display:none">
  <h2>Link inválido</h2>
  <p>Este link de compartilhamento expirou ou está incorreto.</p>
  <br>
  <a href="index.html" class="btn-cta">Ir para o início</a>
</div>

<script src="js/disc-share-app.js"></script>
</body>
</html>
